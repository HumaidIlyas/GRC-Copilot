version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8080"
    environment:
      - LLM_VENDOR=${LLM_VENDOR:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - NVD_API_KEY=${NVD_API_KEY:-}
      - DATABASE_URL=sqlite:///./grc_copilot.db
    volumes:
      - backend_data:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  backend_data:
